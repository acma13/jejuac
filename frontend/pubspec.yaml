name: frontend
description: "Jeju Archery Club Frontend Project"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
    
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.2.4
  http: ^1.2.0

  # Syncfusion 버전을 최신으로 끌어올립니다 (intl 0.20.2 지원 버전)
  syncfusion_flutter_calendar: ^28.1.38
  syncfusion_localizations: ^28.1.38

  # 엔진이 요구하는 0.20.2 유지
  intl: ^0.20.2 
         
  flutter_local_notifications: ^20.1.0
  timezone: ^0.10.0
  
  #파이어베이스(알림기능)
  firebase_core: ^3.10.1
  firebase_messaging: ^15.2.1
  web: ^1.1.1
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/bow-and-arrow.svg