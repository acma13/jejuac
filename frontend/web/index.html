<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="제주양궁클럽">

  <link rel="apple-touch-icon" href="icons/bow-and-arrow.png">
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>제주양궁클럽</title>
  <link rel="manifest" href="manifest.json">

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>
</head>
<body>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/firebase-messaging-sw.js');
      });
    }
  </script>
  
  <script src="flutter_bootstrap.js" async></script>

  <script>
    // 2. 플러터 엔진이 로드되었을 때 서비스 워커를 우리 파일로 바꿔치기합니다.
    window.addEventListener("flutter-first-frame", function() {
      console.log("✅ 플러터 첫 프레임 로드 완료");
    });

    // 플러터 부트스트랩 과정에서 커스텀 설정을 주입하는 최신 표준 방식
    if (typeof _flutter === 'undefined') {
      window.addEventListener('flutter-initialized', function (event) {
        // 이미 초기화된 경우 처리
      });
    }
  </script>

</body>
</html>
